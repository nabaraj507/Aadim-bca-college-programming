<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Login & Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="forms">
        <div class="form login">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-field">
                    <input type="email" name="email" placeholder="Email" required />
                </div>
                <div class="input-field">
                    <input type="password" name="password" placeholder="Password" required />
                </div>
                <button class="btn">Login</button>
                <p class="toggle">Don't have an account? <span id="showRegister">Register</span></p>
            </form>
        </div>

        <div class="form register">
            <h2>Register</h2>
            <form id="registerForm">
                <div class="input-field">
                    <input type="text" name="name" placeholder="Name" required />
                </div>
                <div class="input-field">
                    <input type="email" name="email" placeholder="Email" required />
                </div>
                <div class="input-field">
                    <input type="password" name="password" placeholder="Password" required />
                </div>
                <button class="btn">Register</button>
                <p class="toggle">Already have an account? <span id="showLogin">Login</span></p>
            </form>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>

<style>
    body {
    margin: 0;
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    font-family: Poppins, sans-serif;
}

.container {
    width: 400px;
    background: #fff;
    padding: 40px 30px;
    border-radius: 15px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

.forms {
    position: relative;
    width: 200%;
    display: flex;
    transition: transform .6s ease;
}

.form {
    width: 50%;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.input-field {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #aaa;
}

.btn {
    width: 100%;
    padding: 12px;
    background: #6e8efb;
    border: none;
    color: #fff;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

.toggle {
    text-align: center;
    margin-top: 10px;
}

.toggle span {
    color: #6e8efb;
    cursor: pointer;
    font-weight: bold;
}

.container.show-register .forms {
    transform: translateX(-50%);
}

</style>
<script>
    const container = document.querySelector(".container");
document.getElementById("showRegister").onclick = () => {
    container.classList.add("show-register");
};
document.getElementById("showLogin").onclick = () => {
    container.classList.remove("show-register");
};

// LOGIN
document.getElementById("loginForm").onsubmit = async e => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const res = await fetch("/login", {
        method: "POST",
        body: new URLSearchParams(formData)
    });
    alert(await res.text());
};

// REGISTER
document.getElementById("registerForm").onsubmit = async e => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const res = await fetch("/register", {
        method: "POST",
        body: new URLSearchParams(formData)
    });
    alert(await res.text());
};

</script>
