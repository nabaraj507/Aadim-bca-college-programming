<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Dice Layout</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4; /* Light background to make the container stand out */
        }

        .container {
            position: relative;
            width: 400px;
            height: 400px;
            background-color: #8B5A5A; /* Reddish brown color similar to the image */
            border-radius: 20px;
        }

        .box {
            position: absolute;
            width: 90px;
            height: 60px;
            background-color: #000000; /* Black boxes */
        }

        /* Positioning each box using nth-child */
        .box:nth-child(1) {
            top: 0;
            left: 30px;
        }

        .box:nth-child(2) {
            top: 0;
            right: 30px;
        }

        .box:nth-child(3) {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .box:nth-child(4) {
            bottom: 0;
            left: 30px;
        }

        .box:nth-child(5) {
            bottom: 0;
            right: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

</body>
</html>
