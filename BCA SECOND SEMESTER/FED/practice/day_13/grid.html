<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .parent{
            border: 2px solid black;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
        }

        .child{
        background-color: red;
        width: 50px;
        height: 50px;
        margin: 5px;
      }
    </style>
</head>
<body>
    
    <div class="parent">
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
    </div>
</body>
</html>
