<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML FORM</title>
</head>

<body>
    <h1>Form</h1>
    <form action="">
        <!-- <label for="name">Name:</label> -->
        <input type="text" placeholder="Enter your name"> <br>
        <input type="email" placeholder="Enter your email"><br>
        <input type="date"><br>
        <input type="range" min="0" max="100"><br>
        <input type="password"><br>
        <input type="checkbox" value="Chicken">Chicken<br>
        <input type="checkbox" value="Mutton">Mutton<br>
        <input type="checkbox" value="Veg">Veg<br>
        
        <label for="">Please select your prefered shift:</label> <br>
        <input type="radio" name="shift"  > Morning <br>
        <input type="radio" name="shift"  > Day <br>
        <input type="radio" name="shift"  > Night <br>

        <input type="radio" name="gender" value="male"> Male <br>
        <input type="radio" name="gender" value="female"> Female <br>
        <button type="submit">Submit</button>
    </form>

</body>

</html>
