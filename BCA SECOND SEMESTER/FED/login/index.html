<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nabaraj Shrestha</title>
</head>
<body>


<div class="container">
    <div class="forms">
        <div class="form login">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-field">
                    <input type="email" name="email" placeholder="Email" required />
                </div>
                <div class="input-field">
                    <input type="password" name="password" placeholder="Password" required />
                </div>
                <button class="btn">Login</button>
                <p class="toggle">Don't have an account? <span> <a href="register.html"> Register </a></span></p>
            </form>
        </div>

  
</div>

          
     </div>
</body>
</html>




<style>
      body {
    margin: 0;
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    font-family: Poppins, sans-serif;
}

.container {
    width: 400px;
    background: #fff;
    padding: 40px 30px;
    border-radius: 15px;
    position: relative;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

.forms {
    position: relative;
    width: 200%;
}

.form {
    width: 50%;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.input-field {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #aaa;
}

.btn {
    width: 100%;
    padding: 12px;
    background: #6e8efb;
    border: none;
    color: #fff;
    font-size: 16px;
    border-radius: 8px;
}

.toggle {
    text-align: center;
    margin-top: 10px;
}

.toggle span {
    color: #6e8efb;

    font-weight: bold;

</style>
